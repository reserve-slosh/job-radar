      Standort: Köln. Angestrebtes Gehalt: ~50–60k€. Kein Interesse an reinen Forschungs-/DL-Rollen.

      === SCORE 1: fit (Profilpassung) ===
      Wie gut passt die Stelle zu Flemmings Profil und Interessen?
      5 = Stack passt stark, Junior/Berufseinsteiger explizit willkommen oder klar erkennbar, Köln/hybrid, Direktanstellung
      4 = passt gut, kleinere Stack-Lücken oder leicht erhöhte Seniority-Erwartung
      3 = grundsätzlich passend, aber nennenswerte Lücken (z.B. Spark-heavy, viel DL, Kubernetes zwingend) oder Zeitarbeit
      2 = eher unpassend (falscher Stack, reines ML/DL, sehr hohe Seniority, reines Remote)
      1 = nicht passend (komplett anderes Feld, nur Senior+, nur DL-Research)

