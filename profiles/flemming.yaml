name: flemming

profile_text: |
  Erfahrung:
  - M.Sc. Data Science (HAW Kiel, 02/2026, Note 1,7); Schwerpunkte: Data Management, Cloud Computing, Big Data Technologies (alle 1,0)
  - ~1,5 Jahre als Data Scientist am GEOMAR (Automatisierung, Benchmarking, Python-Pipelines)
  - Freiberuflich: End-to-End Datenpipeline für Medienunternehmen (Scraping, Normalisierung, Deduplizierung, MySQL, Docker, Google Cloud, Hetzner-Linux-Server)
  - Masterarbeit: modulares Python-Package (src-Layout, pytest, mehrere Solver-Familien) für AUV-Routenoptimierung
  - job-radar (Eigenprojekt): Multi-Source-Aggregation von Stellenanzeigen, LLM-Integration zur strukturierten Inhaltsanalyse und Profilbewertung (Haiku für Extraktion/Scoring, Sonnet mit Extended Thinking für Generierung), bewusste Aufgabentrennung nach Modelltyp und Kosten; SQLite, Streamlit-Dashboard
  - infermail (Eigenprojekt): automatisierte E-Mail-Pipeline (IMAP-Fetching mehrerer Postfächer, PostgreSQL, Docker Compose, ML-Klassifizierung mit selbstverbesserndem Trainings-Loop); autonomer Betrieb mit Monitoring
  - Noch keine Vollzeit-Festanstellung; alle Erfahrung parallel zum Studium

  Stack (produktiv eingesetzt):
  - Python (stark): Pandas, NumPy, Requests/BeautifulSoup, SQLAlchemy, Matplotlib
  - Data Engineering: ETL/ELT, MySQL, PostgreSQL, Docker, Docker Compose, Google Cloud, Linux (Ubuntu), Git
  - Software Engineering: modulare Paketarchitektur, pytest, Claude Code, Agentic Workflows (produktiv eingesetzt als Entwicklungswerkzeug)
  - LLM-Integration: Anthropic API (Haiku, Sonnet, Extended Thinking), bewusste Modellauswahl nach Aufgabentyp und Kosten
  - SQL: mid-level
  - Scikit-Learn, FastAPI/Flask, PyTorch: Grundlagen

  Keine Produktionserfahrung mit: Spark, Kafka, Airflow, dbt, Terraform, Kubernetes — Konzepte bekannt

  ---

  Anschreiben-Vorlagen:

  Vorlage A (Qimia) — Stil: formal, Sie-Form, konservativ, selbstbewusst-sachlich:
  ---
  Sehr geehrte Damen und Herren,

  ich habe meinen Master in Data Science im Februar 2026 abgeschlossen und suche nun den Einstieg in ein Umfeld, das mit echten Datenproblemen arbeitet. Qimia spricht mich an, weil das Unternehmen beides verbindet: technisch anspruchsvolle Projektarbeit und ein klares Interesse daran, Mitarbeiterinnen und Mitarbeiter weiterzuentwickeln.

  Was mich im Laufe des Studiums am stärksten interessiert hat, war weniger die Modellierung als das Bauen: robuste Pipelines, saubere Systemarchitektur, Automatisierung von Prozessen, die vorher manuell oder gar nicht liefen. Data Engineering ist der Bereich, der das am direktesten erfüllt. Ich betreibe privat einen eigenen Homeserver, weil mich Deployment, Monitoring und Systemwartung intrinsisch motivieren und mir die Arbeit, Dinge zuverlässig im Hintergrund laufen zu lassen, echten Spaß macht.

  In meiner Masterarbeit habe ich ein vollständiges Python-Package zur Routenoptimierung für autonome Unterwasserfahrzeuge entwickelt: mit eigenem src-Layout, getrennten Modulen für Routing, Environment, IO und Visualisierung sowie einer vollständigen Testsuite. Mehrere Solver-Familien wurden unter operativen und umweltbedingten Constraints systematisch bewertet. Das Package ist modular aufgebaut, sodass andere Forschende damit weiterarbeiten können.

  Produktionserfahrung habe ich durch zwei freiberufliche Projekte für ein Medienunternehmen gesammelt, zu dem ich über ein Studienprojekt Kontakt aufgebaut hatte. Der wesentliche Auftrag war eine automatisierte Event-Datenpipeline: Scraping, Normalisierung, Deduplizierung, Persistierung in MySQL, containerisiert mit Docker, betrieben in der Google Cloud und auf einem Hetzner-Server. Deployment, Monitoring und Wartung habe ich eigenständig verantwortet. Ein zweites Projekt bestand im Troubleshooting und Redeployment einer Anwendung, die fehlerhaft in Betrieb genommen worden war.

  Am GEOMAR habe ich Python-basierte Auswertungsprozesse automatisiert und Ergebnisse für eine interdisziplinäre Forschungsgruppe aufbereitet, mit dem Anspruch, algorithmisch komplexe Zusammenhänge auch für Forschende außerhalb der Informatik verständlich zu machen.

  Daneben habe ich zwei Eigenprojekte aufgebaut, die produktiv laufen: job-radar aggregiert Stellenanzeigen aus mehreren Quellen, normalisiert unstrukturierte Rohtexte und bewertet sie per LLM-Integration — Haiku für strukturierte Extraktion und Scoring, Sonnet mit Extended Thinking für aufwändigere Generierungsaufgaben, bewusst aufgeteilt nach Aufgabentyp und Kosten. infermail ist eine automatisierte E-Mail-Pipeline: IMAP-Fetching, Persistierung in PostgreSQL, ML-Klassifizierung mit einem Trainings-Loop aus dem laufenden Nutzungsverhalten, containerisiert mit Docker Compose. Beide Systeme laufen autonom; ich greife nur ein, wenn etwas schiefläuft.

  Mit Spark, Kafka und vergleichbaren Systemen habe ich bislang keine Produktionserfahrung. Die zugrundeliegenden Konzepte verteilter Verarbeitung kenne ich aus dem Studium und habe mich darüber hinaus autodidaktisch damit beschäftigt. Ich bin überzeugt, dass ich mich in jeden konkreten Stack schnell einarbeiten kann, sobald ich weiß, wofür ich es tue. Ich bringe ein solides Python-Fundament, Erfahrung mit Cloud-Deployment und Linux sowie die Fähigkeit, Systeme strukturiert aufzubauen und wartbar zu halten. Ob als direkter Einstieg oder im Rahmen Ihres Trainingsprogramms, ich bin für beides offen.

  Ich würde mich über ein Gespräch freuen.

  Mit freundlichen Grüßen
  Flemming Reese
  ---

  Vorlage B (taod) — Stil: locker, Du-Form, progressiv/Startup, direkt-offensiv:
  ---
  Hallo taod Team,

  ich bewerbe mich als Junior Data Engineer bei euch. Der Mix aus Cloud-Datenprojekten, Datenintegration und Kundenarbeit passt sehr gut zu dem, was ich in den letzten Projekten gemacht habe und worauf ich mich weiter spezialisieren möchte: robuste Datenprozesse bauen, die im Alltag wirklich funktionieren – und das im Austausch mit Stakeholdern.

  Ich habe im Februar 2026 meinen M.Sc. Data Science an der HAW Kiel mit Note 1,7 abgeschlossen und bringe praktische Erfahrung aus Forschung und Projekten mit. Am GEOMAR habe ich u. a. einen Test- und Auswertungsprozess in Python automatisiert und in reproduzierbare Abläufe überführt. Wichtig war mir dabei, dass Ergebnisse nachvollziehbar, wiederholbar und für Entscheidungs- und Projektkontexte sauber aufbereitet sind.

  Sehr greifbar in Richtung Data Engineering ist ein freiberufliches Projekt, bei dem ich 10–15 Event-Websites scrape, Daten normalisiere und dedupliziere, in MySQL persistiere und containerisiert in der Google Cloud betreibe – Deployment, Monitoring und Wartung vollständig in Eigenverantwortung. Daneben habe ich zwei Eigenprojekte aufgebaut: job-radar aggregiert Stellenanzeigen aus mehreren Quellen, normalisiert Rohtexte und bewertet sie per LLM-Integration (Haiku für Extraktion und Scoring, Sonnet mit Extended Thinking für Generierung). infermail ist eine automatisierte E-Mail-Pipeline mit IMAP-Fetching, PostgreSQL, Docker Compose und ML-Klassifizierung mit selbstverbesserndem Trainings-Loop – läuft autonom, verbessert sich periodisch.

  An taod reizt mich besonders, dass ich mich in Projekten an modernen Cloud-Datenplattformen (z. B. Azure oder Snowflake) weiterentwickeln kann und gleichzeitig den Workshop-/Consulting-Anteil aktiv mitnehme. Ich wohne in Köln und finde den regelmäßigen Austausch im Büro und im Team für Lernkurve und Qualität der Arbeit einfach sinnvoll.

  Ich freue mich, wenn wir uns kennenlernen. Eine vollständige Notenübersicht kann ich bei Bedarf gerne nachreichen.

  Viele Grüße
  Flemming Reese
  ---

