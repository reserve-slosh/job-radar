name: hjoerdis

profile_text: |
  Hintergrund:
  - M.Sc. / Diplom Soziale Arbeit / Sozialpädagogik
  - 2–5 Jahre Berufserfahrung; aktuell angestellt, aktiv suchend
  - Tätigkeitsbereiche: Projektkoordination, Prävention & Gesundheitsförderung,
    Gleichstellung & Diversity, Bildung / Workshops / Seminare,
    Sozialmanagement / Case Management, NGO / Verbandsarbeit
  - Arbeitsschwerpunkt: Mix aus fachlicher und koordinativer Arbeit, eher fachlich

  Präferenzen:
  - Teilzeit bevorzugt
  - Festanstellung oder Projektbefristung
  - Köln bevorzugt, Hybrid okay
  - Bevorzugte Branchen: Gleichstellung/Diversity, Bildung/Prävention, NGO/gemeinnützige Träger, BGM
  - Anschreibenstil: flexibel (formell oder locker je nach Arbeitgeber)
  - Sprache: Deutsch oder Englisch

  # TODO: mit Hjördis konkretisieren — bisherige Stationen, Kernkompetenzen, Beispielprojekte

search_profiles:
  - name: koeln
    remote_only: false
    location_filter:
      - "Köln"
      - "Cologne"
      - "Koeln"
      - "50"
    arbeitsagentur_queries:
      - was: "Gleichstellung"
        wo: "50667"
        umkreis: 25
      - was: "Diversity"
        wo: "50667"
        umkreis: 25
      - was: "Gesundheitsmanagement"
        wo: "50667"
        umkreis: 25
      - was: "Sozialarbeit"
        wo: "50667"
        umkreis: 25
      - was: "Bildungsreferent"
        wo: "50667"
        umkreis: 25
    title_keywords:
      # Diversity / Gleichstellung
      - gleichstellung
      - diversity
      - inklusion
      - inclusion
      - "d&i"
      # Bildung / Prävention
      - bildungsreferent
      - bildungskoordinat
      - prävention
      - prevention
      # Gesundheit / BGM
      - gesundheitsmanagement
      - bgm
      - wellbeing
      - "mental health"
      # Beratung / Koordination (sozial)
      - sozialberatung
      - sozialkoordinat
      - "case management"
      - "care management"
      - sozialmanagement
      # CSR / People
      - nachhaltigkeitsreferent
      - "people & culture"
      - personalreferent
      # Breite Sozial-Treffer
      - sozialpädagog
      - sozialarbeiter
      - gemeinwesenarbeit
    title_exclude:
      - head of
      - director
      - "vp "
      - chief
      - pflegefachkraft
      - krankenpflege
    fit_score_context: |
      Kandidatin: Hjördis, M.Sc. Soziale Arbeit, 2–5 Jahre Erfahrung in Gleichstellung,
      BGM, Bildung/Prävention, Case Management und NGO-Arbeit. Teilzeit bevorzugt.
      Köln bevorzugt, Hybrid okay. Festanstellung oder Projektbefristung.

      Präferenzen (Priorität absteigend):
      1. Inhalte / Sinnhaftigkeit der Tätigkeit
      2. Work-Life-Balance / Flexibilität (inkl. Teilzeit)
      3. Gehalt
      4. Standort / Pendelweg
      5. Team / Unternehmenskultur
      6. Entwicklungsmöglichkeiten

      Bevorzugte Arbeitgeber: Gleichstellung/Diversity in Unternehmen oder Behörden,
      Bildung/Prävention (Schulen, Jugendhilfe, Träger), NGO / gemeinnützige Träger,
      BGM in Unternehmen. Öffentlicher Dienst und Sozialwirtschaft (AWO, DRK, Caritas) okay.

      Abwertend:
      - Zeitarbeit / Personalvermittler (z.B. Hays, Adecco)
      - Reine Pflegeberufe (Kranken-, Altenpflege)
      - Vollständig remote (kein Ortsbezug Köln)
      - Nur Vollzeit ohne Teilzeit-Option

      Scoring-Leitfaden:
      5 = Rolle passt inhaltlich stark (Gleichstellung, BGM, Bildung, NGO), Köln/hybrid,
          Teilzeit möglich, Festanstellung oder Befristung, sinnstiftender Arbeitgeber
      4 = gute inhaltliche Passung, kleinere Abstriche (z.B. nur Vollzeit oder etwas weiter weg)
      3 = grundsätzlich passend, aber nennenswerte Lücken (z.B. kaum Sozialbezug,
          reine Verwaltung, oder Zeitarbeit)
      2 = eher unpassend (falscher Inhalt, zu hohe Seniority, reines Remote)
      1 = nicht passend (Pflegeberufe, komplett anderes Feld, nur Senior+)

